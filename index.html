<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hangman_game</title>

  <link rel="stylesheet" href="./css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- JS -->
  <script src="./js/script.js" defer></script>
</head>

<body>

  <div class="layout">

    <div class="hangman">
      <h1 class="hangman__title">Hangman</h1>

      <div class="hangman__image-container">
        <img class="hangman__image" id="hangmanImg" src="./assets/img/h-0.jpg" />
      </div>

      
      <p class="hangman__attempts" id="attempts">
        10 attempts left
      </p>

      <div class="hangman__word" id="wordDisplay"></div>

      <div class="hangman__letters" id="lettersContainer"></div>

      <p class="hangman__message" id="message"></p>

      <button class="hangman__restart" id="restartBtn">Play Again</button>
    </div>

    <div class="used-words-panel">

      <h3>Used Words</h3>

      <table class="used-words-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Word</th>
          </tr>
        </thead>

        
        <tbody id="usedWordsList"></tbody>

      </table>

    </div>

  </div>

</body>
</html>
