<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangman_game</title>
    <script src="./js/script.js" defer></script>
</head>
<body>
    <div class="hangman">
  <h1 class="hangman__title">Hangman</h1>

  <div class="hangman__image-container">
    <img class="hangman__image" id="hangmanImg" src="./assets/img/h-0.jpg" />
  </div>

  <div class="hangman__word" id="wordDisplay"></div>

  <div class="hangman__letters" id="lettersContainer"></div>

  <p class="hangman__message" id="message"></p>

  <button class="hangman__restart" id="restartBtn">Play Again</button>
</div>
</body>
</html>
